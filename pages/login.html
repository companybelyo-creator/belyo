<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion coiffeur — Belyo</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root{--cream:#F7F3EE;--cream-dark:#EDE7DC;--ink:#1A1714;--ink-light:#5C5550;--gold:#C4A87A;--gold-light:#E8D9BF;--white:#FFFFFF;--border:rgba(26,23,20,0.1);--radius:12px;--radius-sm:8px;--font-display:'Cormorant Garamond',serif;--font-body:'DM Sans',sans-serif;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font-body);background:var(--cream);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;}
    a{text-decoration:none;color:inherit;}

    .header{background:var(--ink);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;}
    .header-logo{font-family:var(--font-display);font-size:1.5rem;font-weight:600;color:var(--white);letter-spacing:-.01em;}
    .header-link{font-size:13px;color:rgba(255,255,255,.5);transition:color .15s;}
    .header-link:hover{color:var(--white);}

    .hero{background:var(--ink);padding:2.5rem 1.5rem 3.5rem;text-align:center;}
    .hero-title{font-family:var(--font-display);font-size:2.2rem;font-weight:300;color:var(--white);margin-bottom:.4rem;}
    .hero-title em{font-style:italic;color:var(--gold);}
    .hero-sub{font-size:13px;color:rgba(255,255,255,.45);max-width:300px;margin:0 auto;}

    .form-wrap{max-width:420px;margin:-1.5rem auto 0;padding:0 1.5rem 3rem;flex:1;}
    .form-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;}

    .auth-toggle{display:flex;margin-bottom:1.5rem;border:1px solid var(--border);border-radius:100px;padding:3px;background:var(--cream);}
    .auth-tab{flex:1;padding:8px;border-radius:100px;border:none;font-family:var(--font-body);font-size:13px;cursor:pointer;background:transparent;color:var(--ink-light);transition:all .15s;}
    .auth-tab.active{background:var(--white);color:var(--ink);font-weight:500;box-shadow:0 1px 4px rgba(26,23,20,.08);}

    .form-group{margin-bottom:.85rem;}
    .form-label{display:block;font-size:12px;font-weight:500;color:var(--ink-light);margin-bottom:4px;}
    .form-input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:15px;background:var(--cream);color:var(--ink);outline:none;transition:border-color .15s;}
    .form-input:focus{border-color:var(--gold);}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .pwd-wrap{position:relative;}
    .pwd-wrap .form-input{padding-right:44px;}
    .pwd-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--ink-light);font-size:16px;}
    .btn-submit{width:100%;padding:13px;background:var(--ink);color:var(--white);border:none;border-radius:100px;font-family:var(--font-body);font-size:15px;font-weight:500;cursor:pointer;transition:opacity .2s;margin-top:.5rem;}
    .btn-submit:hover{opacity:.88;}
    .btn-submit:disabled{opacity:.45;cursor:not-allowed;}
    .divider{text-align:center;font-size:12px;color:var(--ink-light);margin:1rem 0;position:relative;}
    .divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--border);}
    .divider::before{left:0;}.divider::after{right:0;}

    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--white);padding:12px 24px;border-radius:100px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;}
    .toast.show{opacity:1;}

    @media(max-width:480px){.form-row{grid-template-columns:1fr;}}
  </style>
</head>
<body>

<div class="header">
  <a href="/index.html" class="header-logo">Belyo</a>
  <div style="display:flex;align-items:center;gap:1.5rem">
    <a href="/index.html" class="header-link">← Retour au site</a>
    <a href="/client/login.html" class="header-link">Espace client →</a>
  </div>
</div>

<div class="hero">
  <div class="hero-title">Mon <em>salon</em></div>
  <div class="hero-sub">Connectez-vous pour gérer votre activité</div>
</div>

<div class="form-wrap">
  <div class="form-card">

    <div class="auth-toggle">
      <button class="auth-tab active" id="tab-login"    onclick="showTab('login')">Connexion</button>
      <button class="auth-tab"        id="tab-register" onclick="showTab('register')">Créer un salon</button>
    </div>

    <!-- LOGIN -->
    <div id="form-login">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="login-email" placeholder="aron@salon-moisan.fr" />
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <div class="pwd-wrap">
          <input type="password" class="form-input" id="login-pwd" placeholder="••••••••" />
          <button type="button" class="pwd-eye" onclick="togglePwd('login-pwd',this)">&#128065;</button>
        </div>
      </div>
      <button class="btn-submit" onclick="doLogin()" id="btn-login">Se connecter</button>
      <div class="divider" style="margin-top:1.2rem">ou</div>
      <div style="text-align:center;font-size:13px;color:var(--ink-light)">
        Pas encore de salon ? <a onclick="showTab('register')" style="color:var(--gold);cursor:pointer">Créer mon espace</a>
      </div>
    </div>

    <!-- REGISTER -->
    <div id="form-register" style="display:none">
      <div class="form-group">
        <label class="form-label">Nom du salon *</label>
        <input type="text" class="form-input" id="reg-salon" placeholder="Salon Moisan" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Prénom *</label>
          <input type="text" class="form-input" id="reg-prenom" placeholder="Aron" />
        </div>
        <div class="form-group">
          <label class="form-label">Nom *</label>
          <input type="text" class="form-input" id="reg-nom" placeholder="Moisan" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email *</label>
        <input type="email" class="form-input" id="reg-email" placeholder="aron@salon-moisan.fr" />
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe *</label>
        <div class="pwd-wrap">
          <input type="password" class="form-input" id="reg-pwd" placeholder="6 caractères minimum" />
          <button type="button" class="pwd-eye" onclick="togglePwd('reg-pwd',this)">&#128065;</button>
        </div>
      </div>
      <button class="btn-submit" onclick="doRegister()" id="btn-register">Créer mon salon</button>
      <div style="text-align:center;font-size:13px;color:var(--ink-light);margin-top:1rem">
        Déjà un compte ? <a onclick="showTab('login')" style="color:var(--gold);cursor:pointer">Se connecter</a>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script>
function showTab(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab==='login');
  document.getElementById('tab-register').classList.toggle('active', tab==='register');
  document.getElementById('form-login').style.display    = tab==='login'    ? 'block' : 'none';
  document.getElementById('form-register').style.display = tab==='register' ? 'block' : 'none';
}
function togglePwd(id, btn) {
  var i = document.getElementById(id);
  i.type = i.type==='password' ? 'text' : 'password';
  btn.innerHTML = i.type==='password' ? '&#128065;' : '&#128064;';
}
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = type==='error' ? '#993C1D' : '#1A1714';
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 3500);
}

function makeSlug(name) {
  return name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,40);
}
async function createSalonSettings(userId, salonName) {
  var base=makeSlug(salonName), slug=base, tries=0;
  while(tries<10){
    var c=await sb.from('salon_settings').select('user_id').eq('slug',slug).maybeSingle();
    if(!c.data) break;
    tries++; slug=base+'-'+tries;
  }
  await sb.from('salon_settings').upsert(
    { user_id:userId, slug, salon_name:salonName },
    { onConflict:'user_id' }
  );
}

async function doLogin() {
  var email = document.getElementById('login-email').value.trim();
  var pwd   = document.getElementById('login-pwd').value;
  if (!email||!pwd) { showToast('Remplissez tous les champs','error'); return; }
  var btn = document.getElementById('btn-login');
  btn.disabled=true; btn.textContent='Connexion...';
  var res = await sb.auth.signInWithPassword({ email, password: pwd });
  btn.disabled=false; btn.textContent='Se connecter';
  if (res.error) { showToast('Email ou mot de passe incorrect','error'); return; }
  var meta = res.data.user.user_metadata||{};
  if (meta.role==='client') {
    window.location.href = '/client/home.html';
  } else {
    await createSalonSettings(res.data.user.id, meta.salon_name||'Mon salon');
    window.location.href = '/pages/dashboard.html';
  }
}

async function doRegister() {
  var salonName = document.getElementById('reg-salon').value.trim();
  var prenom    = document.getElementById('reg-prenom').value.trim();
  var nom       = document.getElementById('reg-nom').value.trim();
  var email     = document.getElementById('reg-email').value.trim();
  var pwd       = document.getElementById('reg-pwd').value;
  if (!salonName||!prenom||!nom||!email||!pwd) { showToast('Remplissez les champs obligatoires','error'); return; }
  if (pwd.length<6) { showToast('Mot de passe trop court (6 min)','error'); return; }
  var btn = document.getElementById('btn-register');
  btn.disabled=true; btn.textContent='Création...';
  var res = await sb.auth.signUp({
    email, password: pwd,
    options:{ data:{ name:prenom+' '+nom, salon_name:salonName, role:'salon' } }
  });
  btn.disabled=false; btn.textContent='Créer mon salon';
  if (res.error) { showToast(res.error.message,'error'); return; }
  if (res.data&&res.data.user) {
    await createSalonSettings(res.data.user.id, salonName);
    showToast('Salon créé ! Connectez-vous.');
    document.getElementById('login-email').value = email;
    showTab('login');
  }
}

(async function(){
  var params = new URLSearchParams(window.location.search);
  if (params.get('tab')==='register') showTab('register');
  var s = await sb.auth.getSession();
  if (!s.data||!s.data.session) return;
  var meta = s.data.session.user.user_metadata||{};
  window.location.href = meta.role==='client' ? '/client/home.html' : '/pages/dashboard.html';
})();
</script>
</body>
</html>
