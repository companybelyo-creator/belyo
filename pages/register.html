<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Créer votre salon — Belyo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>
<div class="auth-page">
  <a href="../index.html" style="position:fixed;top:1.2rem;left:1.5rem;display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink-light);text-decoration:none">&#8592; Retour</a>
  <div class="auth-card">
    <a href="../index.html" class="auth-logo" style="display:block;text-align:center;margin-bottom:.25rem;font-family:var(--font-display);font-size:1.8rem;font-weight:600;">Belyo</a>
    <p style="text-align:center;font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--gold);margin-bottom:.3rem">Espace coiffeur</p>
    <p class="auth-subtitle">Créez votre salon · 14 jours d'essai gratuit</p>
    <p style="font-size:12px;color:var(--ink-light);text-align:center;margin-bottom:1.2rem">Vous êtes client ? <a href="../client.html" style="color:var(--gold)">Accéder à mon espace</a></p>
    <div class="auth-error" id="error-msg"></div>
    <div id="success-msg" style="display:none;background:#d1fae5;border:1px solid #6ee7b7;color:#065f46;font-size:13px;padding:10px 14px;border-radius:8px;margin-bottom:1rem;line-height:1.5;"></div>
    <form id="register-form">
      <div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-light);margin-bottom:.6rem">Votre salon</div>
      <div class="form-group">
        <label class="form-label">Nom du salon *</label>
        <input type="text" class="form-input" id="salon-name" placeholder="Ex : Salon Moisan" required />
      </div>
      <div class="form-group">
        <label class="form-label">Adresse du salon *</label>
        <input type="text" class="form-input" id="salon-address" placeholder="Ex : 12 rue de la Paix, Nantes" required />
      </div>
      <div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-light);margin-top:1.2rem;margin-bottom:.6rem">Vous</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="form-group">
          <label class="form-label">Prénom *</label>
          <input type="text" class="form-input" id="first-name" placeholder="Aron" required />
        </div>
        <div class="form-group">
          <label class="form-label">Nom *</label>
          <input type="text" class="form-input" id="last-name" placeholder="Moisan" required />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email *</label>
        <input type="email" class="form-input" id="email" placeholder="aron@salon-moisan.fr" required />
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe *</label>
        <div style="position:relative">
          <input type="password" class="form-input" id="password" placeholder="8 caractères minimum" required minlength="8" style="padding-right:44px" />
          <button type="button" onclick="var i=document.getElementById('password');i.type=i.type==='password'?'text':'password';this.innerHTML=i.type==='password'?'&#128065;':'&#128064;'" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--ink-light);font-size:16px">&#128065;</button>
        </div>
      </div>
      <button type="submit" class="btn-submit" id="submit-btn" style="margin-top:.5rem">Créer mon salon gratuitement</button>
    </form>
    <p class="auth-switch">Déjà un compte ? <a href="login.html">Se connecter</a></p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script>
(async function() {
  var s = await sb.auth.getSession();
  if (!s.data.session) return;
  var meta = s.data.session.user.user_metadata || {};
  if (meta.role === 'salon') window.location.href = 'dashboard.html';
  else window.location.href = '../client.html';
})();

function makeSlug(name) {
  return name.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // enlever accents
    .replace(/[^a-z0-9]+/g, '-')  // remplacer non-alphanum par tiret
    .replace(/^-+|-+$/g, '')       // trim tirets
    .slice(0, 40);
}

async function createSalonWithSlug(userId, salonName) {
  var base = makeSlug(salonName);
  var slug = base;
  var tries = 0;
  // Tester si le slug est libre, sinon ajouter un suffixe
  while (tries < 10) {
    var check = await sb.from('salon_settings').select('user_id').eq('slug', slug).maybeSingle();
    if (!check.data) break; // slug libre
    tries++;
    slug = base + '-' + tries;
  }
  await sb.from('salon_settings').upsert({ user_id: userId, slug: slug, salon_name: salonName }, { onConflict: 'user_id' });
  return slug;
}

document.getElementById('register-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  var btn=document.getElementById('submit-btn'),err=document.getElementById('error-msg'),ok=document.getElementById('success-msg');
  var salonName=document.getElementById('salon-name').value.trim();
  var salonAddress=document.getElementById('salon-address').value.trim();
  var firstName=document.getElementById('first-name').value.trim();
  var lastName=document.getElementById('last-name').value.trim();
  var email=document.getElementById('email').value.trim();
  var password=document.getElementById('password').value;
  if(!salonName||!salonAddress||!firstName||!email||!password){
    err.textContent='Remplissez tous les champs obligatoires.';err.classList.add('visible');return;
  }
  btn.disabled=true;btn.textContent='Création en cours...';
  err.classList.remove('visible');ok.style.display='none';
  var res=await sb.auth.signUp({
    email:email,password:password,
    options:{data:{role:'salon',salon_name:salonName,salon_address:salonAddress,first_name:firstName,last_name:lastName,name:firstName+' '+lastName}}
  });
  if(res.error){
    var msgs={'User already registered':'Un compte existe déjà avec cet email.'};
    err.textContent=msgs[res.error.message]||res.error.message;
    err.classList.add('visible');btn.disabled=false;btn.textContent='Créer mon salon gratuitement';return;
  }
  if(res.data.session){
    await createSalonWithSlug(res.data.session.user.id, salonName);
    window.location.href='dashboard.html';
  } else {
    ok.innerHTML='&#10003; Vérifiez votre email pour confirmer, puis <a href="login.html" style="color:#065f46;font-weight:500">connectez-vous</a>.';
    ok.style.display='block';document.getElementById('register-form').style.display='none';
  }
});
</script>
</body>
</html>
