<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salon — Belyo</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root{--cream:#F7F3EE;--cream-dark:#EDE7DC;--ink:#1A1714;--ink-light:#5C5550;--gold:#C4A87A;--gold-light:#E8D9BF;--white:#FFFFFF;--border:rgba(26,23,20,0.1);--radius:12px;--radius-sm:8px;--font-display:'Cormorant Garamond',serif;--font-body:'DM Sans',sans-serif;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font-body);background:var(--cream);color:var(--ink);min-height:100vh;}
    a{text-decoration:none;color:inherit;}

    /* HEADER */
    .header{padding:1rem 1.5rem;display:flex;align-items:center;gap:12px;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;}
    .btn-back{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink-light);background:none;border:none;cursor:pointer;font-family:var(--font-body);padding:0;transition:color .15s;}
    .btn-back:hover{color:var(--ink);}
    .btn-back svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;}
    .header-logo{font-family:var(--font-display);font-size:1.3rem;font-weight:600;margin-left:auto;}

    /* HERO */
    .salon-hero{position:relative;height:240px;background:var(--cream-dark);overflow:hidden;}
    .salon-hero img{width:100%;height:100%;object-fit:cover;}
    .salon-hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(26,23,20,.65) 0%,transparent 50%);}

    /* CONTENT */
    .content{max-width:600px;margin:0 auto;padding:0 1.5rem 120px;}

    /* INFO CARD */
    .info-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:1.4rem;margin-top:-2rem;position:relative;z-index:10;margin-bottom:1rem;}
    .salon-name{font-family:var(--font-display);font-size:2rem;font-weight:300;margin-bottom:.3rem;}
    .salon-name em{font-style:italic;color:var(--gold);}
    .salon-meta{display:flex;flex-direction:column;gap:6px;margin-top:.8rem;}
    .meta-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-light);}
    .meta-row svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0;}

    /* SECTIONS */
    .section{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:1.4rem;margin-bottom:1rem;}
    .section-title{font-size:11px;font-weight:500;color:var(--ink-light);text-transform:uppercase;letter-spacing:.07em;margin-bottom:1rem;}
    .prest-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .prest-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid var(--border);}
    .prest-name{font-size:13px;font-weight:400;color:var(--ink);}
    .prest-prix{font-size:13px;font-weight:500;color:var(--gold);}
    .prest-section-label{font-size:12px;font-weight:500;color:var(--ink-light);margin-bottom:8px;margin-top:12px;}
    .prest-section-label:first-child{margin-top:0;}

    /* CTA fixé en bas */
    .cta-bar{position:fixed;bottom:0;left:0;right:0;padding:1rem 1.5rem;background:var(--white);border-top:1px solid var(--border);z-index:100;}
    .cta-bar-inner{max-width:600px;margin:0 auto;}
    .btn-reserve{display:block;width:100%;padding:15px;background:var(--ink);color:var(--white);border:none;border-radius:100px;font-family:var(--font-body);font-size:16px;font-weight:500;cursor:pointer;text-align:center;text-decoration:none;transition:opacity .15s;}
    .btn-reserve:hover{opacity:.88;}

    /* Loading */
    .loader{text-align:center;padding:4rem 1rem;color:var(--ink-light);font-size:14px;}
    .spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px;}
    @keyframes spin{to{transform:rotate(360deg);}}

    @media(max-width:480px){
      .prest-grid{grid-template-columns:1fr;}
      .salon-hero{height:200px;}
    }
  </style>
</head>
<body>

<div class="header">
  <button class="btn-back" onclick="history.back()">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Retour
  </button>
  <a href="client.html" class="header-logo">Belyo</a>
</div>

<!-- HERO -->
<div class="salon-hero" id="salon-hero">
  <img id="salon-hero-img" src="https://images.unsplash.com/photo-1522337360788-8b13dee7a37e?w=800&h=400&fit=crop" alt="Salon" />
  <div class="salon-hero-overlay"></div>
</div>

<!-- CONTENU -->
<div class="content">

  <div id="salon-content">
    <div class="loader"><span class="spinner"></span>Chargement...</div>
  </div>

</div>

<!-- CTA BAR -->
<div class="cta-bar" id="cta-bar" style="display:none">
  <div class="cta-bar-inner">
    <a id="btn-reserve" href="#" class="btn-reserve">Prendre un rendez-vous</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script>

var DEFAULT_PRESTATIONS = {
  homme: ['Coupe', 'Coloration', 'Brushing'],
  femme: ['Coupe', 'Coloration', 'Brushing']
};

(async function() {
  var params   = new URLSearchParams(window.location.search);
  var salonId  = params.get('salon');
  var slug     = params.get('slug');

  if (!salonId && !slug) {
    document.getElementById('salon-content').innerHTML = '<div class="loader">Salon introuvable.</div>';
    return;
  }

  var q = sb.from('salon_settings')
    .select('user_id, salon_name, salon_address, prestations, prix_duree, slug');

  if (salonId) q = q.eq('user_id', salonId);
  else         q = q.eq('slug', slug);

  var res = await q.maybeSingle();

  if (!res.data) {
    document.getElementById('salon-content').innerHTML = '<div class="loader">Salon introuvable.</div>';
    return;
  }

  var s      = res.data;
  var name   = s.salon_name || 'Salon';
  var addr   = s.salon_address || '';
  var pd     = s.prix_duree || {};
  var prestH = (s.prestations && s.prestations.homme) || DEFAULT_PRESTATIONS.homme;
  var prestF = (s.prestations && s.prestations.femme) || DEFAULT_PRESTATIONS.femme;
  var bookUrl = '/book.html?salon=' + s.user_id;

  // Titre page
  document.title = name + ' — Belyo';

  // CTA
  document.getElementById('btn-reserve').href = bookUrl;
  document.getElementById('cta-bar').style.display = 'block';

  // Construire le contenu
  var nameParts = name.split(' ');
  var firstWord = nameParts[0];
  var rest      = nameParts.slice(1).join(' ');

  var html = '';

  // Info card
  html += '<div class="info-card">';
  html += '<div class="salon-name">' + (rest ? firstWord + ' <em>' + rest + '</em>' : '<em>' + firstWord + '</em>') + '</div>';
  if (addr || s.slug) {
    html += '<div class="salon-meta">';
    if (addr) {
      html += '<div class="meta-row"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>' + addr + '</div>';
    }
    html += '</div>';
  }
  html += '</div>';

  // Prestations
  var hasPrest = prestH.length > 0 || prestF.length > 0;
  if (hasPrest) {
    html += '<div class="section">';
    html += '<div class="section-title">Prestations</div>';

    if (prestH.length > 0) {
      html += '<div class="prest-section-label">Homme</div>';
      html += '<div class="prest-grid">';
      prestH.forEach(function(p) {
        var pdata = pd.homme && pd.homme[p];
        var prix  = pdata && pdata.prix ? pdata.prix + '€' : '';
        html += '<div class="prest-item"><span class="prest-name">' + p + '</span>'
          + (prix ? '<span class="prest-prix">' + prix + '</span>' : '') + '</div>';
      });
      html += '</div>';
    }

    if (prestF.length > 0) {
      html += '<div class="prest-section-label" style="margin-top:14px">Femme</div>';
      html += '<div class="prest-grid">';
      prestF.forEach(function(p) {
        var pdata = pd.femme && pd.femme[p];
        var prix  = pdata && pdata.prix ? pdata.prix + '€' : '';
        html += '<div class="prest-item"><span class="prest-name">' + p + '</span>'
          + (prix ? '<span class="prest-prix">' + prix + '</span>' : '') + '</div>';
      });
      html += '</div>';
    }

    html += '</div>';
  }

  document.getElementById('salon-content').innerHTML = html;
})();
</script>
</body>
</html>
