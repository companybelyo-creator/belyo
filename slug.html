<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Belyo — Réservation</title>
  <link rel="icon" href="data:,">
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #F7F3EE; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .loader { text-align: center; }
    .logo { font-family: Georgia, serif; font-size: 1.8rem; font-weight: 600; margin-bottom: 1rem; color: #1A1714; }
    .msg { font-size: 14px; color: #5C5550; }
    .spinner { display: inline-block; width: 24px; height: 24px; border: 2px solid #E8D9BF; border-top-color: #C4A87A; border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #C0392B; font-size: 14px; margin-top: 1rem; display: none; }
  </style>
</head>
<body>
<div class="loader">
  <div class="logo">Belyo</div>
  <div class="spinner"></div>
  <div class="msg" id="msg">Recherche du salon...</div>
  <div class="error" id="err">Salon introuvable. Vérifiez le lien.</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script>
(async function() {
  var params = new URLSearchParams(window.location.search);
  var slug   = params.get('slug');

  if (!slug) {
    window.location.href = '/';
    return;
  }

  try {
    var res = await sb.rpc('get_salon_by_slug', { p_slug: slug });

    if (!res.data) {
      document.getElementById('msg').style.display = 'none';
      document.getElementById('err').style.display = 'block';
      return;
    }

    // Rediriger vers book.html avec l'user_id
    window.location.href = '/book.html?salon=' + res.data.user_id;

  } catch(e) {
    document.getElementById('msg').style.display = 'none';
    document.getElementById('err').style.display = 'block';
  }
})();
</script>
</body>
</html>
